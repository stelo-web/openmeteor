<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Utility Hub | Portal</title>
    <style>
        /* フォントの読み込みを最小限に */
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@700;900&family=Noto+Sans+JP:wght@700;900&display=swap');

        :root {
            --bg-start: #f8fafc;
            --bg-end: #e2e8f0;
            --text-main: #1e293b;
            --text-sub: #64748b;
            --text-mute: #94a3b8;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Inter', 'Noto Sans JP', -apple-system, sans-serif;
            background: radial-gradient(circle at top left, var(--bg-start), var(--bg-end));
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 24px;
            color: var(--text-main);
        }

        header { text-align: center; margin-bottom: 48px; }
        h1 { font-size: 3rem; font-weight: 900; letter-spacing: -0.05em; margin-bottom: 8px; }
        p { color: var(--text-sub); font-weight: 500; }

        main {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 24px;
            width: 100%;
            max-width: 900px;
        }

        @media (min-width: 768px) {
            main { grid-template-columns: repeat(3, 1fr); }
        }

        .glass {
            background: rgba(255, 255, 255, 0.5);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            border: 1px solid rgba(255, 255, 255, 0.4);
            border-radius: 2rem;
            padding: 32px 16px;
            display: flex;
            flex-direction: column;
            align-items: center;
            text-decoration: none;
            transition: transform 0.2s ease, background 0.2s ease;
        }

        /* ホバーアニメーションをモバイルで重くならない程度に調整 */
        @media (hover: hover) {
            .glass:hover {
                background: rgba(255, 255, 255, 0.8);
                transform: translateY(-4px);
            }
            .glass:hover .tool-icon { transform: scale(1.1); }
            .settings:hover .tool-icon { transform: rotate(45deg); }
        }

        .tool-icon { font-size: 2.5rem; margin-bottom: 16px; transition: transform 0.2s ease; }
        h2 { font-size: 1.25rem; font-weight: 700; color: var(--text-main); }
        .desc { font-size: 0.75rem; color: var(--text-mute); mt: 8px; }

        .planned { opacity: 0.5; cursor: default; }
        .badge {
            font-size: 10px;
            background: #e2e8f0;
            padding: 2px 8px;
            border-radius: 999px;
            margin-top: 8px;
            font-weight: 900;
            text-transform: uppercase;
        }

        footer { margin-top: 64px; color: var(--text-mute); font-size: 0.875rem; }
    </style>
</head>
<body>

    <header>
        <h1>Utility Hub</h1>
        <p>Simple, Fast, and Transparent.</p>
    </header>

    <main>
        <a href="/openmeteor/weather" class="glass">
            <div class="tool-icon">🌤️</div>
            <h2>Weather</h2>
            <p class="desc">14-Day Forecast</p>
        </a>

        <a href="/openmeteor/altitude" class="glass">
            <div class="tool-icon">🏔️</div>
            <h2>Altitude</h2>
            <p class="desc">Hyper Checker</p>
        </a>

        <div class="glass planned">
            <div class="tool-icon">📝</div>
            <h2>Format</h2>
            <span class="badge">Planned</span>
        </div>

        <div class="glass settings" style="cursor: pointer;">
            <div class="tool-icon">⚙️</div>
            <h2>Settings</h2>
            <p class="desc">Preferences</p>
        </div>
    </main>

    <footer>
        &copy; 2026 Utility Hub by Stelo.
    </footer>

</body>
</html>
