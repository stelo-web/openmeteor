<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Utility Hub | Portal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&family=Noto+Sans+JP:wght@400;700;900&display=swap');
        body {
            font-family: 'Inter', 'Noto Sans JP', sans-serif;
            background: radial-gradient(circle at top left, #f8fafc, #e2e8f0);
            min-h-screen: 100vh;
        }
        .glass {
            background: rgba(255, 255, 255, 0.6);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.4);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .glass:hover {
            background: rgba(255, 255, 255, 0.8);
            transform: translateY(-5px);
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.05);
        }
        .tool-icon {
            font-size: 2.5rem;
            margin-bottom: 1rem;
        }
    </style>
</head>
<body class="flex flex-col items-center justify-center p-6">

    <header class="text-center mb-12 animate-fade-in">
        <h1 class="text-5xl font-black text-slate-800 tracking-tighter mb-2">Utility Hub</h1>
        <p class="text-slate-500 font-medium">Simple, Fast, and Transparent Tools.</p>
    </header>

    <main class="grid grid-cols-2 md:grid-cols-3 gap-6 w-full max-w-4xl">
        
        <a href="/weather" class="glass rounded-[2rem] p-8 flex flex-col items-center text-center group">
            <div class="tool-icon group-hover:scale-110 transition-transform">🌤️</div>
            <h2 class="text-xl font-bold text-slate-800">Weather</h2>
            <p class="text-xs text-slate-400 mt-2">14-Day Forecast</p>
        </a>

        <div class="glass rounded-[2rem] p-8 flex flex-col items-center text-center opacity-60">
            <div class="tool-icon">🎙️</div>
            <h2 class="text-xl font-bold text-slate-800">Audio Extract</h2>
            <span class="text-[10px] bg-slate-200 px-2 py-0.5 rounded-full mt-2 uppercase font-bold">Planned</span>
        </div>

        <div class="glass rounded-[2rem] p-8 flex flex-col items-center text-center opacity-60">
            <div class="tool-icon">📝</div>
            <h2 class="text-xl font-bold text-slate-800">Text Format</h2>
            <span class="text-[10px] bg-slate-200 px-2 py-0.5 rounded-full mt-2 uppercase font-bold">Planned</span>
        </div>

        <div class="glass rounded-[2rem] p-8 flex flex-col items-center text-center group cursor-pointer">
            <div class="tool-icon group-hover:rotate-45 transition-transform">⚙️</div>
            <h2 class="text-xl font-bold text-slate-800">Settings</h2>
            <p class="text-xs text-slate-400 mt-2">Preferences</p>
        </div>

    </main>

    <footer class="mt-16 text-slate-400 text-sm font-medium">
        &copy; 2026 Utility Hub by Stelo.
    </footer>

</body>
</html>
