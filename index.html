<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Weather Tracker Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; }
        #map { z-index: 10; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        .active-day { border-color: #2563eb; background-color: #eff6ff; transform: translateY(-2px); }
    </style>
</head>
<body class="bg-gradient-to-br from-slate-100 to-blue-50 min-h-screen p-4 md:p-8 flex justify-center">

    <div class="max-w-5xl w-full grid grid-cols-1 lg:grid-cols-3 gap-6">
        
        <div class="lg:col-span-1 bg-white/70 backdrop-blur-md rounded-2xl shadow-xl p-6 border border-white/50 flex flex-col gap-5 h-fit">
            <h1 class="text-2xl font-bold text-slate-800 tracking-tight">Weather Tracker</h1>
            
            <div class="flex flex-col gap-2">
                <label class="text-sm font-semibold text-slate-700">開始日時を指定</label>
                <input type="datetime-local" id="datetime-input" class="w-full p-3 rounded-xl border border-slate-200 bg-white/50 focus:outline-none focus:ring-2 focus:ring-blue-400 transition">
            </div>

            <div class="flex flex-col gap-2">
                <label class="text-sm font-semibold text-slate-700">場所を指定</label>
                <button id="btn-current-location" class="w-full py-2.5 px-4 bg-slate-800 hover:bg-slate-700 text-white rounded-xl shadow-md transition font-medium text-sm flex items-center justify-center gap-2">
                    現在地を取得
                </button>
                <div class="grid grid-cols-2 gap-3 mt-2">
                    <input type="number" id="lat-input" placeholder="緯度" step="0.0001" class="p-3 rounded-xl border border-slate-200 bg-white/50 text-sm">
                    <input type="number" id="lon-input" placeholder="経度" step="0.0001" class="p-3 rounded-xl border border-slate-200 bg-white/50 text-sm">
                </div>
            </div>

            <div id="map" class="w-full h-48 rounded-xl border border-slate-200 shadow-inner"></div>

            <button id="btn-fetch" class="w-full py-3 px-4 bg-blue-600 hover:bg-blue-500 text-white rounded-xl shadow-lg transition font-bold text-lg">
                14日間の予報を取得
            </button>
        </div>

        <div class="lg:col-span-2 flex flex-col gap-6">
            
            <div class="bg-white/70 backdrop-blur-md rounded-3xl shadow-xl p-8 border border-white/50 relative min-h-[400px] flex flex-col items-center justify-center">
                <div id="empty-state" class="text-center text-slate-400 flex flex-col items-center gap-3">
                    <p>データを取得するとここに詳細が表示されます</p>
                </div>

                <div id="weather-result" class="w-full hidden">
                    <div class="flex flex-col md:flex-row justify-between items-center mb-8 gap-4">
                        <div class="text-center md:text-left">
                            <p id="res-time" class="text-blue-600 font-bold mb-1"></p>
                            <h2 id="res-desc" class="text-4xl font-black text-slate-800 flex items-center gap-3"></h2>
                        </div>
                        <div class="text-5xl font-light text-slate-700">
                            <span id="res-temp">--</span><span class="text-2xl ml-1">°C</span>
                        </div>
                    </div>

                    <div class="grid grid-cols-2 md:grid-cols-4 gap-4">
                        <div class="bg-white/50 p-4 rounded-2xl border border-white">
                            <p class="text-xs font-bold text-slate-400 uppercase mb-1">体感温度</p>
                            <p class="text-xl font-bold text-slate-700"><span id="res-app-temp">--</span>°C</p>
                        </div>
                        <div class="bg-white/50 p-4 rounded-2xl border border-white">
                            <p class="text-xs font-bold text-slate-400 uppercase mb-1">湿度</p>
                            <p class="text-xl font-bold text-slate-700"><span id="res-humidity">--</span>%</p>
                        </div>
                        <div class="bg-white/50 p-4 rounded-2xl border border-white">
                            <p class="text-xs font-bold text-slate-400 uppercase mb-1">風速</p>
                            <p class="text-xl font-bold text-slate-700"><span id="res-wind">--</span>m/s</p>
                        </div>
                        <div class="bg-white/50 p-4 rounded-2xl border border-white">
                            <p class="text-xs font-bold text-slate-400 uppercase mb-1">降水量</p>
                            <p class="text-xl font-bold text-slate-700"><span id="res-precip">--</span>mm</p>
                        </div>
                    </div>
                </div>
            </div>

            <div id="forecast-nav" class="bg-white/30 backdrop-blur-sm rounded-2xl p-2 overflow-x-auto no-scrollbar flex gap-3 hidden">
                </div>
        </div>
    </div>

    <script>
        const latInput = document.getElementById('lat-input');
        const lonInput = document.getElementById('lon-input');
        const datetimeInput = document.getElementById('datetime-input');
        const forecastNav = document.getElementById('forecast-nav');
        let weatherData = null; 
        let selectedHour = 0; // ユーザーが最初に選んだ「時」を保持

        const weatherCodes = {
            0: { desc: "快晴", icon: "☀️" }, 1: { desc: "晴れ", icon: "🌤️" }, 2: { desc: "一部曇り", icon: "⛅" }, 3: { desc: "曇り", icon: "☁️" },
            45: { desc: "霧", icon: "🌫️" }, 61: { desc: "雨", icon: "☔" }, 71: { desc: "雪", icon: "❄️" }, 95: { desc: "雷雨", icon: "⚡" }
        };

        const now = new Date();
        now.setMinutes(0); // 視認性のため分を切り捨て
        const localISO = new Date(now.getTime() - now.getTimezoneOffset() * 60000).toISOString().slice(0, 16);
        datetimeInput.value = localISO;

        // 地図初期化
        let map = L.map('map').setView([35.6895, 139.6917], 10);
        L.tileLayer('https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png').addTo(map);
        let marker = L.marker([35.6895, 139.6917]).addTo(map);

        map.on('click', e => updateLocation(e.latlng.lat, e.latlng.lng));
        document.getElementById('btn-current-location').addEventListener('click', () => {
            navigator.geolocation.getCurrentPosition(pos => updateLocation(pos.coords.latitude, pos.coords.longitude));
        });

        function updateLocation(lat, lon) {
            latInput.value = lat.toFixed(4);
            lonInput.value = lon.toFixed(4);
            marker.setLatLng([lat, lon]);
            map.flyTo([lat, lon], 11);
        }

        document.getElementById('btn-fetch').addEventListener('click', async () => {
            const lat = latInput.value;
            const lon = lonInput.value;
            const startDt = new Date(datetimeInput.value);
            selectedHour = startDt.getHours();

            if (!lat || !lon) return alert("場所を指定してください");

            // 開始日から13日後（計14日間）を計算
            const endDt = new Date(startDt);
            endDt.setDate(startDt.getDate() + 13);

            const fmt = d => d.toISOString().split('T')[0];
            const url = `https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}&hourly=temperature_2m,relative_humidity_2m,apparent_temperature,precipitation,weather_code,wind_speed_10m&start_date=${fmt(startDt)}&end_date=${fmt(endDt)}&timezone=auto`;

            try {
                const res = await fetch(url);
                weatherData = await res.json();
                renderForecastNav(startDt);
                updateDisplay(0); // 初日を表示
            } catch (e) { alert("取得失敗"); }
        });

        function renderForecastNav(startDt) {
            forecastNav.innerHTML = '';
            forecastNav.classList.remove('hidden');
            
            for (let i = 0; i < 14; i++) {
                const date = new Date(startDt);
                date.setDate(startDt.getDate() + i);
                
                // その日の指定時刻のインデックス
                const dataIdx = (i * 24) + selectedHour;
                const code = weatherData.hourly.weather_code[dataIdx];
                const weather = weatherCodes[code] || { icon: "☁️" };

                const card = document.createElement('div');
                card.className = `flex-shrink-0 w-20 p-3 rounded-xl border border-transparent bg-white/50 cursor-pointer transition all duration-200 flex flex-col items-center gap-1 hover:bg-white`;
                card.onclick = () => {
                    document.querySelectorAll('#forecast-nav div').forEach(el => el.classList.remove('active-day'));
                    card.classList.add('active-day');
                    updateDisplay(i);
                };
                if(i === 0) card.classList.add('active-day');

                card.innerHTML = `
                    <span class="text-[10px] font-bold text-slate-400 uppercase">${date.toLocaleDateString('ja-JP', {weekday:'short'})}</span>
                    <span class="text-sm font-bold text-slate-700">${date.getDate()}日</span>
                    <span class="text-xl">${weather.icon}</span>
                    <span class="text-xs font-bold text-blue-500">${weatherData.hourly.temperature_2m[dataIdx].toFixed(0)}°</span>
                `;
                forecastNav.appendChild(card);
            }
        }

        function updateDisplay(dayOffset) {
            const idx = (dayOffset * 24) + selectedHour;
            const d = weatherData.hourly;

            document.getElementById('empty-state').classList.add('hidden');
            document.getElementById('weather-result').classList.remove('hidden');

            const dateLabel = new Date(d.time[idx]).toLocaleString('ja-JP', { month: 'long', day: 'numeric', hour: '2-digit', minute: '2-digit' });
            document.getElementById('res-time').textContent = dateLabel;
            
            const weather = weatherCodes[d.weather_code[idx]] || { desc: "不明", icon: "❓" };
            document.getElementById('res-desc').innerHTML = `<span>${weather.icon}</span> ${weather.desc}`;
            
            document.getElementById('res-temp').textContent = d.temperature_2m[idx].toFixed(1);
            document.getElementById('res-app-temp').textContent = d.apparent_temperature[idx].toFixed(1);
            document.getElementById('res-humidity').textContent = d.relative_humidity_2m[idx];
            document.getElementById('res-wind').textContent = d.wind_speed_10m[idx].toFixed(1);
            document.getElementById('res-precip').textContent = d.precipitation[idx].toFixed(1);
        }
    </script>
</body>
</html>
