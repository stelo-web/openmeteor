<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Utility Hub | Portal</title>
    <style>
        :root {
            --bg: #f8fafc;
            --text: #1e293b;
            --sub: #64748b;
            --accent: #3b82f6;
            --glass: rgba(255, 255, 255, 0.6);
            --ease: cubic-bezier(0.4, 0, 0.2, 1);
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: radial-gradient(circle at top left, #ffffff, #e2e8f0);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 24px;
            color: var(--text);
            overflow-x: hidden;
        }

        header {
            text-align: center;
            margin-bottom: 48px;
            animation: fadeIn 0.8s var(--ease) forwards;
        }

        h1 {
            font-size: clamp(2.5rem, 8vw, 3.5rem);
            font-weight: 900;
            letter-spacing: -0.05em;
            background: linear-gradient(135deg, #1e293b 0%, #475569 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        main {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 20px;
            width: 100%;
            max-width: 850px;
            animation: fadeIn 1s var(--ease) 0.2s both;
        }

        @media (min-width: 768px) {
            main { grid-template-columns: repeat(3, 1fr); }
        }

        .glass {
            background: var(--glass);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.4);
            border-radius: 2.5rem;
            padding: 40px 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            text-decoration: none;
            color: inherit;
            position: relative;
            transition: all 0.4s var(--ease);
            will-change: transform, box-shadow; /* アニメーションの最適化 */
        }

        .glass:hover {
            background: rgba(255, 255, 255, 0.85);
            transform: translateY(-8px) scale(1.02);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.08);
            border-color: rgba(255, 255, 255, 0.7);
        }

        .tool-icon {
            font-size: 2.8rem;
            margin-bottom: 16px;
            transition: transform 0.5s var(--ease);
        }

        .glass:hover .tool-icon {
            transform: scale(1.15) rotate(5deg);
        }

        .settings:hover .tool-icon {
            transform: rotate(90deg);
        }

        h2 { font-size: 1.2rem; font-weight: 800; letter-spacing: -0.02em; }
        .desc { font-size: 0.75rem; color: var(--sub); margin-top: 6px; font-weight: 500; }

        .planned { opacity: 0.6; grayscale: 1; }
        .badge {
            font-size: 9px;
            background: #e2e8f0;
            padding: 3px 10px;
            border-radius: 20px;
            margin-top: 10px;
            font-weight: 900;
            letter-spacing: 0.05em;
        }

        footer {
            margin-top: 60px;
            color: var(--sub);
            font-size: 0.8rem;
            font-weight: 600;
            letter-spacing: 0.02em;
            opacity: 0.8;
        }
    </style>
</head>
<body>

    <header>
        <h1>Utility Hub</h1>
        <p>Simple, Fast, and Transparent Tools.</p>
    </header>

    <main>
        <a href="/openmeteor/weather" class="glass">
            <div class="tool-icon">🌤️</div>
            <h2>Weather</h2>
            <p class="desc">14-Day Forecast</p>
        </a>

        <a href="/openmeteor/altitude" class="glass">
            <div class="tool-icon">🏔️</div>
            <h2>Altitude</h2>
            <p class="desc">Hyper Checker</p>
        </a>

        <div class="glass planned">
            <div class="tool-icon">📝</div>
            <h2>Text Format</h2>
            <span class="badge">PLANNED</span>
        </div>

        <div class="glass settings" style="cursor: pointer;">
            <div class="tool-icon">⚙️</div>
            <h2>Settings</h2>
            <p class="desc">Preferences</p>
        </div>
    </main>

    <footer>
        &copy; 2026 Utility Hub by Stelo.
    </footer>

</body>
</html>
