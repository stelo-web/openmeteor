<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Altitude Buddy | Del Hub</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&family=Noto+Sans+JP:wght@400;700;900&display=swap');
        body { font-family: 'Noto Sans JP', 'Inter', sans-serif; transition: background 2s ease; color: white; min-height: 100vh; overflow-x: hidden; }
        .glass { background: rgba(255, 255, 255, 0.1); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.1); }
        .text-glow { text-shadow: 0 0 20px rgba(59, 130, 246, 0.5); }
        .bg-dawn { background: linear-gradient(135deg, #f97316, #6366f1); }
        .bg-day { background: linear-gradient(135deg, #0ea5e9, #3b82f6); }
        .bg-dusk { background: linear-gradient(135deg, #4c1d95, #f43f5e); }
        .bg-night { background: linear-gradient(135deg, #0f172a, #1e293b); }
        #map { height: 180px; border-radius: 1.5rem; width: 100%; margin-top: 1rem; z-index: 10; display: none; }
        .show-map { display: block !important; }
    </style>
</head>
<body class="bg-night p-4 pb-10">

    <nav class="max-w-md mx-auto mb-6 flex items-center justify-between lg:max-w-4xl">
        <a href="/stelo-web/delhub" class="glass px-5 py-2 rounded-full text-sm font-black text-white/80 transition hover:bg-white/20">戻る</a>
        <div class="text-right">
            <div id="local-time" class="text-[10px] font-bold text-white/60 tracking-wider">--:--:--</div>
        </div>
    </nav>

    <main class="max-w-md mx-auto flex flex-col gap-4 lg:max-w-4xl lg:grid lg:grid-cols-2">
        
        <div class="flex flex-col gap-4">
            <div class="glass rounded-[3rem] p-8 shadow-2xl flex flex-col items-center text-center relative overflow-hidden">
                <div id="gps-indicator" class="flex items-center gap-2 mb-4">
                    <div id="status-dot" class="w-2 h-2 bg-blue-500 rounded-full animate-pulse"></div>
                    <span id="mode-text" class="text-[9px] font-black text-blue-400 tracking-widest uppercase">GPS Tracking</span>
                </div>

                <div class="mb-2">
                    <span id="alt-display" class="text-8xl font-black text-white text-glow tracking-tighter">0</span>
                    <span class="text-xl font-bold text-white/40">m</span>
                </div>
                
                <div class="w-full bg-white/10 h-1.5 rounded-full mb-2 overflow-hidden">
                    <div id="oxygen-bar" class="h-full bg-blue-400 transition-all duration-1000" style="width: 100%"></div>
                </div>
                <p class="text-[9px] font-black text-white/30 uppercase tracking-widest">推定酸素濃度: <span id="oxygen-val" class="text-white">100</span>%</p>
                
                <div id="map"></div>
                <button id="btn-toggle-map" class="mt-4 text-[10px] font-black text-white/40 border border-white/10 px-4 py-2 rounded-full hover:bg-white/5 transition">地図で場所を指定</button>
            </div>

            <div class="grid grid-cols-2 gap-4">
                <div class="glass rounded-[2rem] p-5 flex flex-col items-center">
                    <span class="text-[9px] font-black text-white/30 uppercase tracking-widest mb-1">地上気圧 (hPa)</span>
                    <span id="pressure-val" class="text-2xl font-black tracking-tight">---</span>
                    <span id="pressure-trend" class="text-[9px] font-bold text-blue-400 mt-1">Ready</span>
                </div>
                <div class="glass rounded-[2rem] p-5 flex flex-col items-center">
                    <span class="text-[9px] font-black text-white/30 uppercase tracking-widest mb-1">最高高度</span>
                    <span id="alt-max" class="text-2xl font-black text-blue-400 tracking-tight">0</span>
                </div>
            </div>
        </div>

        <div class="flex flex-col gap-4">
            <div class="glass rounded-[2.5rem] p-6 shadow-xl h-full flex flex-col">
                <div class="flex justify-between items-center mb-6">
                    <p class="text-[10px] font-black text-white/40 tracking-widest uppercase">高度履歴</p>
                    <div class="flex gap-2">
                        <button id="btn-fetch-press" class="text-[9px] font-black bg-white/10 px-3 py-1.5 rounded-full hover:bg-white/20 transition">気圧更新</button>
                        <button id="btn-clear" class="text-[9px] font-black bg-rose-500/20 text-rose-400 px-3 py-1.5 rounded-full hover:bg-rose-500/40 transition">消去</button>
                    </div>
                </div>
                <div class="flex-grow min-h-[220px]"><canvas id="altChart"></canvas></div>
            </div>
        </div>
    </main>

    <script>
        let altHistory = JSON.parse(localStorage.getItem('alt_history') || '[]');
        let maxAlt = parseInt(localStorage.getItem('alt_max') || '0');
        let currentAlt = 0;
        let displayAlt = 0;
        let lastGpsTime = Date.now();
        let lastApiCall = 0;
        let currentLat = 35.6895, currentLon = 139.6917;
        let map, marker, altChart;
        let isManualMode = false;

        function animateValue() {
            const diff = currentAlt - displayAlt;
            if (Math.abs(diff) > 0.1) {
                displayAlt += diff * 0.12;
                document.getElementById('alt-display').textContent = Math.round(displayAlt);
                requestAnimationFrame(animateValue);
            } else {
                displayAlt = currentAlt;
                document.getElementById('alt-display').textContent = Math.round(displayAlt);
            }
        }

        function calcOxygen(alt) {
            const o2 = Math.exp(-alt / 8400) * 100;
            document.getElementById('oxygen-val').textContent = o2.toFixed(1);
            document.getElementById('oxygen-bar').style.width = o2 + '%';
        }

        async function fetchPressure() {
            const btn = document.getElementById('btn-fetch-press');
            btn.textContent = "取得中...";
            try {
                const res = await fetch(`https://api.open-meteo.com/v1/forecast?latitude=${currentLat}&longitude=${currentLon}&current=surface_pressure&timezone=auto`);
                const data = await res.json();
                const p = data.current.surface_pressure;
                document.getElementById('pressure-val').textContent = Math.round(p);
                const trend = document.getElementById('pressure-trend');
                if (p < 1005) { trend.textContent = "⚠️ 低気圧(荒天注意)"; trend.className="text-[9px] font-bold text-rose-400"; }
                else { trend.textContent = "安定(高気圧)"; trend.className="text-[9px] font-bold text-blue-400"; }
                lastApiCall = Date.now();
            } catch (e) { document.getElementById('pressure-val').textContent = "Error"; }
            finally { btn.textContent = "気圧更新"; }
        }

        function updateAltitude(alt) {
            if (alt === null) return;
            currentAlt = alt;
            animateValue();
            calcOxygen(alt);
            if (alt > maxAlt) {
                maxAlt = Math.round(alt);
                document.getElementById('alt-max').textContent = maxAlt;
                localStorage.setItem('alt_max', maxAlt);
            }
            altHistory.push(Math.round(alt));
            if (altHistory.length > 100) altHistory.shift();
            localStorage.setItem('alt_history', JSON.stringify(altHistory));
            updateChart();
        }

        function initMap() {
            if (map) return;
            map = L.map('map', { zoomControl: false }).setView([currentLat, currentLon], 5);
            L.tileLayer('https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png').addTo(map);
            map.on('click', async e => {
                isManualMode = true;
                currentLat = e.latlng.lat; currentLon = e.latlng.lng;
                if (marker) marker.setLatLng(e.latlng); else marker = L.marker(e.latlng).addTo(map);
                document.getElementById('mode-text').textContent = "Manual Mode";
                document.getElementById('status-dot').className = "w-2 h-2 bg-amber-500 rounded-full";
                const res = await fetch(`https://api.open-meteo.com/v1/elevation?latitude=${currentLat}&longitude=${currentLon}`);
                const data = await res.json();
                updateAltitude(data.elevation[0]);
                fetchPressure();
            });
        }

        if ("geolocation" in navigator) {
            navigator.geolocation.watchPosition(pos => {
                lastGpsTime = Date.now();
                if (!isManualMode) {
                    currentLat = pos.coords.latitude; currentLon = pos.coords.longitude;
                    if (pos.coords.altitude !== null) {
                        updateAltitude(pos.coords.altitude);
                        if (Date.now() - lastApiCall > 900000) fetchPressure();
                    }
                }
            }, null, { enableHighAccuracy: true });
        }

        function updateUI() {
            const now = new Date();
            document.getElementById('local-time').textContent = now.toLocaleTimeString('ja-JP');
            const h = now.getHours();
            const b = document.body;
            b.className = 'p-4 pb-10 ' + (h>=5&&h<8?'bg-dawn':h>=8&&h<17?'bg-day':h>=17&&h<20?'bg-dusk':'bg-night');
            
            if (!isManualMode && Date.now() - lastGpsTime > 10000) {
                document.getElementById('map').classList.add('show-map');
                initMap();
                document.getElementById('mode-text').textContent = "Signal Lost";
            }
        }

        const setupChart = () => {
            const ctx = document.getElementById('altChart').getContext('2d');
            altChart = new Chart(ctx, {
                type: 'line',
                data: { labels: altHistory.map((_,i)=>i), datasets: [{ data: altHistory, borderColor: '#3b82f6', fill: true, backgroundColor: 'rgba(59,130,246,0.1)', tension: 0.4, pointRadius: 0 }] },
                options: { responsive: true, maintainAspectRatio: false, animation: false, plugins: { legend: { display: false } }, scales: { y: { grid: { color: 'rgba(255,255,255,0.05)' }, ticks: { color: 'rgba(255,255,255,0.3)', font: { size: 8 } } }, x: { display: false } } }
            });
        };

        function updateChart() { if (altChart) { altChart.data.labels = altHistory.map((_,i)=>i); altChart.data.datasets[0].data = altHistory; altChart.update(); } }

        document.getElementById('btn-toggle-map').onclick = () => {
            const el = document.getElementById('map');
            el.classList.toggle('show-map');
            if (el.classList.contains('show-map')) initMap();
        };

        document.getElementById('btn-clear').onclick = () => {
            if (confirm("全データをリセットしますか？")) { localStorage.clear(); location.reload(); }
        };

        document.getElementById('btn-fetch-press').onclick = fetchPressure;

        window.onload = () => {
            setupChart();
            setInterval(updateUI, 1000);
            if (altHistory.length > 0) {
                currentAlt = altHistory[altHistory.length - 1];
                animateValue(); calcOxygen(currentAlt);
                document.getElementById('alt-max').textContent = maxAlt;
            }
            setTimeout(fetchPressure, 2000);
        };
    </script>
</body>
</html>
