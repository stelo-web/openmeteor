<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SkyCast Pro | 天気予報</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&family=Noto+Sans+JP:wght@400;700;900&display=swap');
        body { font-family: 'Noto Sans JP', 'Inter', sans-serif; transition: background 0.5s ease; overflow-x: hidden; }
        .glass { background: rgba(255, 255, 255, 0.7); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.4); }
        #map { height: 180px; border-radius: 1.5rem; z-index: 1; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        .active-card { border-color: #3b82f6 !important; background: white !important; transform: translateY(-4px); box-shadow: 0 10px 15px -3px rgba(59, 130, 246, 0.2); }
        
        /* グラフ表示用 */
        .charts-outer { width: 100%; overflow: hidden; }
        .charts-slider { display: flex; overflow-x: auto; scroll-snap-type: x mandatory; gap: 1rem; padding: 0.5rem 0.25rem; scroll-behavior: smooth; }
        .chart-box { flex: 0 0 calc(100% - 1rem); scroll-snap-align: center; min-height: 220px; overflow: hidden; display: block; }
        @media (min-width: 1024px) { .chart-box { flex: 1; } }
        .graph-hidden { height: 0; opacity: 0; pointer-events: none; overflow: hidden; }
        .graph-visible { height: auto; opacity: 1; pointer-events: auto; margin-top: 1rem; }

        /* 背景色グラデーション */
        .bg-clear { background: linear-gradient(135deg, #7dd3fc, #38bdf8); }
        .bg-cloudy { background: linear-gradient(135deg, #cbd5e1, #94a3b8); }
        .bg-rain { background: linear-gradient(135deg, #64748b, #475569); }
        .bg-snow { background: linear-gradient(135deg, #e2e8f0, #f8fafc); }
        .bg-error { background: #fca5a5 !important; } /* エラー時の赤 */

        /* 横揺れアニメーション */
        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-6px); }
            75% { transform: translateX(6px); }
        }
        .shake { animation: shake 0.15s ease-in-out 0s 2; }
    </style>
</head>
<body class="bg-clear min-h-screen pb-10 p-4">

    <nav class="max-w-md mx-auto mb-4 flex items-center justify-between lg:max-w-5xl">
        <a href="/stelo-web/openmeteor" class="glass px-5 py-2 rounded-full text-sm font-black text-slate-700 flex items-center gap-2 hover:bg-white transition">
            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M10 19l-7-7m0 0l7-7m-7 7h18"></path></svg>
            拠点に戻る
        </a>
        <div class="text-[9px] font-black text-white/70 uppercase tracking-[0.2em]">Stelo / 天気予報</div>
    </nav>

    <div class="max-w-md mx-auto flex flex-col gap-4 lg:max-w-5xl lg:grid lg:grid-cols-3">
        
        <section class="glass rounded-[2rem] p-6 shadow-xl flex flex-col gap-4 order-2 lg:order-1">
            <div class="space-y-4">
                <div>
                    <label class="text-[10px] font-black text-slate-400 uppercase tracking-widest text-center block">日時指定</label>
                    <input type="datetime-local" id="datetime-input" class="w-full mt-1 p-4 rounded-2xl bg-white/50 border-none outline-none font-bold text-slate-700">
                </div>
                
                <div class="grid grid-cols-2 gap-2">
                    <div class="col-span-2 flex gap-2">
                        <input type="text" id="address-input" placeholder="地名を検索..." class="flex-1 p-3 rounded-2xl bg-white/50 text-xs font-bold outline-none focus:bg-white transition">
                        <button id="btn-search" class="px-5 py-3 bg-blue-500 text-white rounded-2xl font-black text-[10px] shadow-lg transition-transform">検索</button>
                    </div>

                    <button id="btn-current" class="col-span-2 py-3 bg-slate-800 text-white rounded-2xl font-black text-xs shadow-lg">現在地を取得</button>
                    <input type="number" id="lat-input" placeholder="緯度" class="p-4 rounded-2xl bg-white/50 text-xs font-bold">
                    <input type="number" id="lon-input" placeholder="経度" class="p-4 rounded-2xl bg-white/50 text-xs font-bold">
                </div>

                <div id="map"></div>
                
                <button id="btn-save-loc" class="w-full py-2 border-2 border-slate-800/10 text-slate-600 rounded-xl font-black text-[10px] hover:bg-white/40 transition">場所を保存</button>
                <div id="saved-locations" class="flex gap-2 overflow-x-auto no-scrollbar pb-1"></div>

                <button id="btn-fetch" class="w-full py-4 bg-blue-600 text-white rounded-[2rem] font-black text-lg shadow-xl shadow-blue-500/30 hover:scale-[1.02] active:scale-95 transition">予報を生成</button>
            </div>
        </section>

        <main class="lg:col-span-2 flex flex-col gap-4 order-1 lg:order-2">
            <div id="main-card" class="glass rounded-[3rem] p-8 shadow-2xl flex flex-col items-center text-center relative min-h-[320px] justify-center">
                <div id="empty-msg" class="text-slate-400 font-bold">場所を選択して予報を生成してください</div>
                <div id="data-content" class="hidden w-full">
                    <p id="display-date" class="text-[10px] font-black text-blue-600 uppercase tracking-widest mb-4"></p>
                    <div id="display-icon" class="text-7xl mb-4"></div>
                    <h2 id="display-desc" class="text-3xl font-black text-slate-800 mb-2"></h2>
                    <div class="flex justify-center items-baseline gap-1 mb-6">
                        <span id="display-temp" class="text-6xl font-light"></span><span class="text-2xl text-slate-400">°C</span>
                    </div>
                    <div class="bg-white/40 p-4 rounded-2xl mb-8">
                        <p id="display-advice" class="text-xs font-bold text-slate-700"></p>
                    </div>
                    <div class="grid grid-cols-4 gap-2">
                        <div class="flex flex-col"><span class="text-[8px] font-black text-slate-400 uppercase">体感</span><span id="val-app" class="text-sm font-bold"></span></div>
                        <div class="flex flex-col"><span class="text-[8px] font-black text-slate-400 uppercase">湿度</span><span id="val-hum" class="text-sm font-bold"></span></div>
                        <div class="flex flex-col"><span class="text-[8px] font-black text-slate-400 uppercase">風速</span><span id="val-wind" class="text-sm font-bold"></span></div>
                        <div class="flex flex-col"><span class="text-[8px] font-black text-slate-400 uppercase">降水</span><span id="val-pre" class="text-sm font-bold"></span></div>
                    </div>
                </div>
            </div>

            <div class="charts-outer">
                <div class="charts-slider no-scrollbar graph-hidden" id="graph-container">
                    <div class="chart-box glass rounded-[2rem] p-5 shadow-xl">
                        <p class="text-[10px] font-black text-rose-500 mb-2 tracking-widest uppercase">気温 (°C)</p>
                        <div class="h-[150px] w-full"><canvas id="tempChart"></canvas></div>
                    </div>
                    <div class="chart-box glass rounded-[2rem] p-5 shadow-xl">
                        <p class="text-[10px] font-black text-blue-500 mb-2 tracking-widest uppercase">降水量 (mm)</p>
                        <div class="h-[150px] w-full"><canvas id="precipChart"></canvas></div>
                    </div>
                    <div class="chart-box glass rounded-[2rem] p-5 shadow-xl">
                        <p class="text-[10px] font-black text-slate-500 mb-2 tracking-widest uppercase">風速 (m/s)</p>
                        <div class="h-[150px] w-full"><canvas id="windChart"></canvas></div>
                    </div>
                </div>
            </div>

            <div class="w-full overflow-x-auto no-scrollbar">
                <div id="forecast-nav" class="flex gap-3 pb-4 min-w-max px-1"></div>
            </div>
        </main>
    </div>

    <script>
        let weatherData = null; let selectedHour = 0;
        let chartT = null, chartP = null, chartW = null;
        let lastSearchTime = 0; // 最終検索時刻の管理

        const weatherMeta = {
            0: { desc: "快晴", icon: "☀️", bg: "bg-clear", advice: "最高の天気です！お出かけ日和ですね。" },
            1: { desc: "晴れ", icon: "🌤️", bg: "bg-clear", advice: "穏やかな晴天になりそうです。" },
            2: { desc: "一部曇り", icon: "⛅", bg: "bg-cloudy", advice: "外での活動にはちょうど良い天気です。" },
            3: { desc: "曇り", icon: "☁️", bg: "bg-cloudy", advice: "傘は不要そうですが、少し肌寒いかも。" },
            61: { desc: "雨", icon: "☔", bg: "bg-rain", advice: "雨が降ります。傘を忘れずに持ちましょう。" },
            71: { desc: "雪", icon: "❄️", bg: "bg-snow", advice: "雪が降る予報です。防寒と足元に注意！" },
            95: { desc: "雷雨", icon: "⚡", bg: "bg-rain", advice: "天候の急変に注意してください。" }
        };

        const latInput = document.getElementById('lat-input');
        const lonInput = document.getElementById('lon-input');
        const datetimeInput = document.getElementById('datetime-input');
        const forecastNav = document.getElementById('forecast-nav');

        window.onload = () => {
            const now = new Date();
            datetimeInput.value = new Date(now.getTime() - now.getTimezoneOffset() * 60000).toISOString().slice(0, 16);
            initMap();
            loadSavedLocations();
        };

        let map, marker;
        function initMap() {
            map = L.map('map', { zoomControl: false }).setView([35.6895, 139.6917], 10);
            L.tileLayer('https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png').addTo(map);
            marker = L.marker([35.6895, 139.6917]).addTo(map);
            map.on('click', e => updatePos(e.latlng.lat, e.latlng.lng));
        }

        function updatePos(lat, lon) {
            latInput.value = Number(lat).toFixed(4);
            lonInput.value = Number(lon).toFixed(4);
            marker.setLatLng([lat, lon]);
            map.flyTo([lat, lon], 12);
        }

        // --- 地名検索 & 1.5秒間隔のバリデーション ---
        document.getElementById('btn-search').onclick = async () => {
            const now = Date.now();
            const btn = document.getElementById('btn-search');
            const query = document.getElementById('address-input').value;

            // 1.5秒以内の連続クリックチェック
            if (now - lastSearchTime < 1500) {
                document.body.classList.add('bg-error');
                btn.classList.add('shake');
                setTimeout(() => {
                    document.body.classList.remove('bg-error');
                    btn.classList.remove('shake');
                }, 500);
                return;
            }

            if (!query) return;
            lastSearchTime = now;
            btn.textContent = "...";
            btn.disabled = true;

            try {
                const response = await fetch(`https://nominatim.openstreetmap.org/search?q=${encodeURIComponent(query)}&format=json&limit=1`);
                const data = await response.json();
                if (data && data.length > 0) {
                    updatePos(data[0].lat, data[0].lon);
                } else {
                    alert("見つかりませんでした");
                }
            } catch (e) {
                alert("エラーが発生しました");
            } finally {
                btn.textContent = "検索";
                btn.disabled = false;
            }
        };

        // Enterキー対応
        document.getElementById('address-input').onkeypress = (e) => {
            if (e.key === 'Enter') document.getElementById('btn-search').click();
        };

        document.getElementById('btn-current').onclick = () => {
            navigator.geolocation.getCurrentPosition(p => updatePos(p.coords.latitude, p.coords.longitude));
        };

        document.getElementById('btn-save-loc').onclick = () => {
            const name = prompt("保存する名前を入力", "マイプレイス");
            if (!name || !latInput.value) return;
            const locs = JSON.parse(localStorage.getItem('skycast_locs') || '[]');
            locs.push({ name, lat: latInput.value, lon: lonInput.value });
            localStorage.setItem('skycast_locs', JSON.stringify(locs));
            loadSavedLocations();
        };

        function loadSavedLocations() {
            const container = document.getElementById('saved-locations');
            const locs = JSON.parse(localStorage.getItem('skycast_locs') || '[]');
            container.innerHTML = locs.map(l => `
                <button onclick="updatePos(${l.lat}, ${l.lon})" class="flex-shrink-0 px-3 py-1.5 bg-white/40 rounded-full text-[9px] font-black border border-white/20 transition hover:bg-white">${l.name}</button>
            `).join('');
        }

        document.getElementById('btn-fetch').onclick = async () => {
            const lat = latInput.value; const lon = lonInput.value;
            const dt = new Date(datetimeInput.value); selectedHour = dt.getHours();
            if (!lat || !lon) return alert("場所を選択してください");

            const fmt = d => `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
            const endDt = new Date(dt); endDt.setDate(dt.getDate() + 13);

            const url = `https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}&hourly=temperature_2m,relative_humidity_2m,apparent_temperature,precipitation,weather_code,wind_speed_10m&timezone=auto&start_date=${fmt(dt)}&end_date=${fmt(endDt)}`;

            try {
                const res = await fetch(url); weatherData = await res.json();
                renderNav(dt); updateUI(0);
                const gc = document.getElementById('graph-container');
                gc.classList.remove('graph-hidden');
                gc.classList.add('graph-visible');
            } catch (e) { alert("データ取得に失敗しました"); }
        };

        function renderNav(startDt) {
            forecastNav.innerHTML = '';
            for (let i = 0; i < 14; i++) {
                const d = new Date(startDt); d.setDate(startDt.getDate() + i);
                const idx = (i * 24) + selectedHour;
                const meta = weatherMeta[weatherData.hourly.weather_code[idx]] || weatherMeta[2];
                const card = document.createElement('div');
                card.className = `flex-shrink-0 w-20 p-4 rounded-[1.5rem] glass cursor-pointer transition-all flex flex-col items-center gap-1 border-2 border-transparent`;
                card.innerHTML = `<span class="text-[9px] font-black text-slate-400">${d.getDate()}日(${d.toLocaleDateString('ja-JP',{weekday:'short'})})</span><span class="text-2xl">${meta.icon}</span><span class="text-xs font-black text-slate-800">${weatherData.hourly.temperature_2m[idx].toFixed(0)}°</span>`;
                card.onclick = () => {
                    document.querySelectorAll('#forecast-nav div').forEach(el => el.classList.remove('active-card'));
                    card.classList.add('active-card'); updateUI(i);
                };
                if(i===0) card.classList.add('active-card');
                forecastNav.appendChild(card);
            }
        }

        function updateUI(dayOffset) {
            const idx = (dayOffset * 24) + selectedHour; const h = weatherData.hourly;
            const meta = weatherMeta[h.weather_code[idx]] || weatherMeta[2];
            document.getElementById('empty-msg').classList.add('hidden');
            document.getElementById('data-content').classList.remove('hidden');
            document.body.className = `min-h-screen transition-colors duration-1000 p-4 ${meta.bg}`;
            
            const dateObj = new Date(h.time[idx]);
            document.getElementById('display-date').textContent = `${dateObj.getMonth()+1}月${dateObj.getDate()}日 ${dateObj.getHours()}:00 の予測`;
            document.getElementById('display-icon').textContent = meta.icon;
            document.getElementById('display-desc').textContent = meta.desc;
            document.getElementById('display-temp').textContent = h.temperature_2m[idx].toFixed(1);
            document.getElementById('display-advice').textContent = meta.advice;
            document.getElementById('val-app').textContent = h.apparent_temperature[idx].toFixed(1) + "°";
            document.getElementById('val-hum').textContent = h.relative_humidity_2m[idx] + "%";
            document.getElementById('val-wind').textContent = h.wind_speed_10m[idx].toFixed(1) + "m";
            document.getElementById('val-pre').textContent = h.precipitation[idx].toFixed(1) + "mm";
            
            updateCharts(dayOffset);
        }

        function updateCharts(dayOffset) {
            const start = dayOffset * 24; const end = start + 24;
            const labels = weatherData.hourly.time.slice(start, end).map(t => new Date(t).getHours() + "時");
            const temps = weatherData.hourly.temperature_2m.slice(start, end);
            const precips = weatherData.hourly.precipitation.slice(start, end);
            const winds = weatherData.hourly.wind_speed_10m.slice(start, end);

            if (chartT) chartT.destroy();
            if (chartP) chartP.destroy();
            if (chartW) chartW.destroy();

            const createConfig = (data, color) => ({
                type: 'line',
                data: {
                    labels: labels,
                    datasets: [{ data: data, borderColor: color, backgroundColor: color + '22', fill: true, tension: 0.4, pointRadius: 2, pointBackgroundColor: color }]
                },
                options: {
                    responsive: true, maintainAspectRatio: false,
                    animation: false,
                    plugins: { legend: { display: false } },
                    scales: { 
                        y: { beginAtZero: false, grid: { color: 'rgba(0,0,0,0.05)' }, ticks: { font: { size: 8 } } }, 
                        x: { grid: { display: false }, ticks: { font: { size: 8, weight: 'bold' } } } 
                    }
                }
            });

            chartT = new Chart(document.getElementById('tempChart').getContext('2d'), createConfig(temps, '#f43f5e'));
            chartP = new Chart(document.getElementById('precipChart').getContext('2d'), createConfig(precips, '#3b82f6'));
            chartW = new Chart(document.getElementById('windChart').getContext('2d'), createConfig(winds, '#64748b'));
        }
    </script>
</body>
</html>
